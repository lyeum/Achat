[project]
name = "achat-deploy"
version = "0.1.0"
description = "플로팅 PIP 캐릭터 챗봇 + 기능 도우미 — 배포 환경 (Windows + CPU)"
requires-python = ">=3.10"
dependencies = [
    # ── LLM 추론 (CPU) ──────────────────────────────────────
    "llama-cpp-python>=0.3.0",        # AVX2 이상 CPU 필수, AVX-512 권장

    # ── UI ──────────────────────────────────────────────────
    "PySide6>=6.7.0",

    # ── 임베딩 / VDB ────────────────────────────────────────
    "sentence-transformers>=3.0.0",   # bge-m3 로컬 임베딩
    "chromadb>=0.5.0",                # 장기 메모리 + RAG VDB

    # ── 데이터 처리 ─────────────────────────────────────────
    "PyYAML>=6.0",
    "numpy",

    # ── 기능 모드 도구 ──────────────────────────────────────
    "Pillow>=10.0.0",                 # 이미지 확장자 변환 (jpg/png/webp/bmp)
    "whoosh>=2.7.4",                  # 로컬 파일 FTS 검색

    # ── 유틸리티 ────────────────────────────────────────────
    "loguru>=0.7.0",
]
