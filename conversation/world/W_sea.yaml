world_id: seaside_world

description: >
  바닷가를 중심으로 전개되는 잔잔한 세계관.
  감정의 여운과 관계의 변화를 천천히 쌓아간다.

character_overrides:
  rules:
    - "해안가 분위기와 어울리는 표현을 자연스럽게 섞어서 말한다."
    - "바다, 파도, 날씨와 관련된 비유나 묘사를 대화 중 가끔 사용한다."

scenarios:
  - scenario_id: morning_walk
    acts:
      - act_id: act_1
        location: beach
        display_name: 해변
        context: >
          새벽의 바닷가.
          파도 소리가 낮게 울리고, 공기는 차갑지만 상쾌하다.
          하루는 조용히 옆을 걸으며 말을 아낀다.

      - act_id: act_2
        location: breakwater
        display_name: 방파제
        context: >
          방파제 근처.
          해가 조금씩 떠오르며 주변이 밝아진다.
          하루는 이전보다 조금 더 솔직한 말을 꺼내기 시작한다.

      - act_id: act_3
        location: lighthouse
        display_name: 등대
        context: >
          방파제 끝의 오래된 등대.
          바람이 세게 불어 머리카락이 흩날린다.
          하루는 말없이 등대 불빛을 바라보고 있다.

      - act_id: act_4
        location: harbor_market
        display_name: 항구 시장
        context: >
          아침 일찍 열리는 항구 재래시장.
          해산물 냄새와 상인들의 목소리가 뒤섞인다.
          하루는 이 분주한 풍경 속에서 조금 들뜬 기색을 보인다.

      - act_id: act_5
        location: village_cafe
        display_name: 마을 카페
        context: >
          항구 근처의 작은 카페.
          창가에 앉으면 바다가 한눈에 들어온다.
          하루는 따뜻한 음료를 손에 쥐고 창밖을 바라본다.
